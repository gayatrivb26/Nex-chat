version: "3.9"

# ============================================================
# NexChat - Docker Compose (Development)
# ============================================================
# Usage:
#   docker-compose up -d                  # Start all services
#   docker-compose up -d postgres redis   # Start specific
#   docker-compose logs -f api            # Follow API logs
#   docker-compose down -v                # Stop + remove volumes
# ============================================================

x-common-env: &common-env
  TZ: UTC
  ASPNETCORE_ENVIRONMENT: Development

x-api-env: &api-env
  <<: *common-env
  ConnectionStrings__DefaultConnection: "Host=${POSTGRES_HOST};Port=${POSTGRES_PORT};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};MaxPoolSize=100;Timeout=30;"
  ConnectionStrings__Redis: "${REDIS_HOST}:${REDIS_PORT},password=${REDIS_PASSWORD},abortConnect=false,connectTimeout=5000,syncTimeout=5000"
  ConnectionStrings__Kafka: "${KAFKA_BOOTSTRAP_SERVERS}"
  MinIO__Endpoint: "${MINIO_ENDPOINT}"
  MinIO__AccessKey: "${MINIO_ROOT_USER}"
  MinIO__SecretKey: "${MINIO_ROOT_PASSWORD}"
  MinIO__PublicUrl: "${MINIO_PUBLIC_URL:-http://localhost:9000}"
  Jwt__Issuer: "${JWT_ISSUER}"
  Jwt__Audience: "${JWT_AUDIENCE}"
  Jwt__AccessTokenExpiryMinutes: "${JWT_ACCESS_TOKEN_EXPIRY_MINUTES}"
  Jwt__RefreshTokenExpiryDays: "${JWT_REFRESH_TOKEN_EXPIRY_DAYS}"
  Firebase__ProjectId: "${FIREBASE_PROJECT_ID}"
  Smtp__Host: "${SMTP_HOST}"
  Smtp__Port: "${SMTP_PORT}"
  Smtp__From: "${SMTP_FROM}"
  Turn__Secret: "${TURN_SECRET}"
  Turn__Realm: "${TURN_REALM}"
  ClamAv__Host: "${CLAMAV_HOST}"
  ClamAv__Port: "${CLAMAV_PORT}"
  Hangfire__Username: "${HANGFIRE_USERNAME}"
  Hangfire__Password: "${HANGFIRE_PASSWORD}"
  Elasticsearch__Uri: "http://${ELASTIC_HOST}:${ELASTIC_PORT}"
  ASPNETCORE_URLS: "http://+:5000"

networks:
  chatapp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local
  minio_data:
    driver: local
  elasticsearch_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local
  clamav_data:
    driver: local

services:

  # ============================================================
  # DATABASES & CACHE
  # ============================================================

  postgres:
    image: postgres:16-alpine
    container_name: nexchat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./infrastructure/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "5432:5432"
    networks:
      chatapp-network:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=4MB
        -c min_wal_size=1GB
        -c max_wal_size=4GB
        -c log_min_duration_statement=1000
        -c log_checkpoints=on
        -c log_lock_waits=on

  redis:
    image: redis:7-alpine
    container_name: nexchat-redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --appendfsync everysec
        --no-appendfsync-on-rewrite no
        --auto-aof-rewrite-percentage 100
        --auto-aof-rewrite-min-size 64mb
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --hz 20
        --loglevel notice
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    networks:
      chatapp-network:
        ipv4_address: 172.20.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # ============================================================
  # MESSAGE QUEUE (Kafka KRaft - no Zookeeper)
  # ============================================================

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: nexchat-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 100
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "29092:29092"
    networks:
      chatapp-network:
        ipv4_address: 172.20.0.21
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  # ============================================================
  # WORKER (Kafka consumers)
  # ============================================================

  worker:
    build:
      context: ./backend
      dockerfile: ChatApp.Worker/Dockerfile
    container_name: nexchat-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      <<: *api-env
      INSTANCE_ID: "worker-1"
    volumes:
      - ./secrets:/run/secrets:ro
    networks:
      chatapp-network:
        ipv4_address: 172.20.0.53
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:5000/ || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: nexchat-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - chatapp-network
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic messages.sent --partitions 6 --replication-factor 1 --config retention.ms=604800000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic messages.status --partitions 6 --replication-factor 1 --config retention.ms=604800000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic notifications --partitions 3 --replication-factor 1 --config retention.ms=86400000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic calls --partitions 3 --replication-factor 1 --config retention.ms=604800000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic analytics --partitions 6 --replication-factor 1 --config retention.ms=2592000000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic media.processing --partitions 3 --replication-factor 1 --config retention.ms=86400000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic deadletter.messages.sent --partitions 3 --replication-factor 1 --config retention.ms=1209600000
      echo 'Kafka topics created successfully'
      kafka-topics --bootstrap-server kafka:9092 --list
      "

  # ============================================================
  # FILE STORAGE
  # ============================================================

  minio:
    image: minio/minio:latest
    container_name: nexchat-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      chatapp-network:
        ipv4_address: 172.20.0.30
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  minio-init:
    image: minio/mc:latest
    container_name: nexchat-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - chatapp-network
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Configuring MinIO...'
      mc alias set nexchat http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}
      mc mb --ignore-existing nexchat/chat-media
      mc mb --ignore-existing nexchat/chat-files
      mc mb --ignore-existing nexchat/chat-avatars
      mc mb --ignore-existing nexchat/call-recordings
      mc anonymous set download nexchat/chat-avatars
      mc ilm add nexchat/chat-media --expiry-days 365
      mc ilm add nexchat/call-recordings --expiry-days 90
      echo 'MinIO configured successfully'
      "

  # ============================================================
  # VIRUS SCANNER
  # ============================================================

  clamav:
    image: clamav/clamav:latest
    container_name: nexchat-clamav
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
      - ./infrastructure/clamav/clamd.conf:/etc/clamav/clamd.conf:ro
    ports:
      - "3310:3310"
    networks:
      chatapp-network:
        ipv4_address: 172.20.0.40
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "3"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # ============================================================
  # WEBRTC TURN SERVER
  # ============================================================

  coturn:
    image: coturn/coturn:latest
    container_name: nexchat-coturn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./infrastructure/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    environment:
      TURN_REALM: ${TURN_REALM}
      TURN_SECRET: ${TURN_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "turnutils_uclient -T -p 3478 127.0.0.1 || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ============================================================
  # BACKEND API (3 replicas via profiles)
  # ============================================================

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: nexchat-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      <<: *api-env
      INSTANCE_ID: "api-1"
    volumes:
      - ./backend:/app/src:ro
      - ./secrets:/run/secrets:ro
    ports:
      - "5000:5000"
    networks:
      chatapp-network:
        ipv4_address: 172.20.0.50
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  api-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: nexchat-api-2
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      <<: *api-env
      INSTANCE_ID: "api-2"
    volumes:
      - ./backend:/app/src:ro
      - ./secrets:/run/secrets:ro
    ports:
      - "5001:5000"
    networks:
      chatapp-network:
        ipv4_address: 172.20.0.51
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  api-3:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: nexchat-api-3
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      <<: *api-env
      INSTANCE_ID: "api-3"
    volumes:
      - ./backend:/app/src:ro
      - ./secrets:/run/secrets:ro
    ports:
      - "5002:5000"
    networks:
      chatapp-network:
        ipv4_address: 172.20.0.52
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  # ============================================================
  # FRONTEND
  # ============================================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: nexchat-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app:delegated
      - /app/node_modules
    ports:
      - "4200:4200"
    networks:
      chatapp-network:
        ipv4_address: 172.20.0.60
    environment:
      NODE_ENV: development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 90s

  # ============================================================
  # REVERSE PROXY
  # ============================================================

  nginx:
    image: nginx:alpine
    container_name: nexchat-nginx
    restart: unless-stopped
    depends_on:
      - api
      - api-2
      - api-3
      - frontend
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d/:/etc/nginx/conf.d/:ro
      - ./infrastructure/nginx/ssl/:/etc/nginx/ssl/:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      chatapp-network:
        ipv4_address: 172.20.0.70
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M

  # ============================================================
  # MONITORING
  # ============================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: nexchat-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/prometheus/rules/:/etc/prometheus/rules/:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      chatapp-network:
        ipv4_address: 172.20.0.80
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  grafana:
    image: grafana/grafana:latest
    container_name: nexchat-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_SERVER_ROOT_URL: http://localhost/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning/:/etc/grafana/provisioning/:ro
      - ./infrastructure/grafana/dashboards/:/var/lib/grafana/dashboards/:ro
    ports:
      - "3000:3000"
    networks:
      chatapp-network:
        ipv4_address: 172.20.0.81
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ============================================================
  # LOGGING (ELK Stack)
  # ============================================================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: nexchat-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      chatapp-network:
        ipv4_address: 172.20.0.90
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: nexchat-kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: ${ELASTIC_PASSWORD}
      SERVER_BASEPATH: /kibana
      SERVER_REWRITEBASEPATH: "true"
    ports:
      - "5601:5601"
    networks:
      chatapp-network:
        ipv4_address: 172.20.0.91
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q 'available'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G

  # ============================================================
  # MAIL (Dev only - MailHog)
  # ============================================================

  mailhog:
    image: mailhog/mailhog:latest
    container_name: nexchat-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      chatapp-network:
        ipv4_address: 172.20.0.100
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M

  # ============================================================
  # KAFKA UI (Dev only)
  # ============================================================

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: nexchat-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: nexchat-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"
    networks:
      chatapp-network:
        ipv4_address: 172.20.0.110
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

# ============================================================
# NexChat - coturn TURN Server Configuration
# ============================================================

# Listening ports
listening-port=3478
tls-listening-port=5349
alt-listening-port=3479
alt-tls-listening-port=5350

# Relay ports range
min-port=49152
max-port=65535

# Realm
realm=nexchat.local

# Use time-limited HMAC credentials
use-auth-secret
static-auth-secret=NexChat_TURN_S3cr3t_2024!

# Do not allow loopback/private IPs as relay addresses (production)
# no-loopback-peers
# no-multicast-peers

# Logging
log-file=/var/log/coturn/turnserver.log
verbose

# Quota
total-quota=300
bps-capacity=0
stale-nonce=600

# Disable DTLS (use TCP/TLS only in restrictive networks)
# no-dtls

# Disable UDP for relay (use TCP relay only) - uncomment if needed
# no-udp-relay

# Fingerprint TURN messages
fingerprint

# Disable CLI interface
no-cli

# Process limits
proc-user=turnserver
proc-group=turnserver

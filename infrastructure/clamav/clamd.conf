# NexChat ClamAV Configuration
LocalSocket /var/run/clamav/clamd.ctl
LocalSocketGroup clamav
LocalSocketMode 660
TCPSocket 3310
TCPAddr 0.0.0.0
FixStaleSocket yes
User clamav
AllowSupplementaryGroups yes
LogFile /var/log/clamav/clamd.log
LogTime yes
LogFileMaxSize 100M
MaxConnectionQueueLength 30
MaxThreads 12
ReadTimeout 185
SendBufTimeout 200
MaxDirectoryRecursion 15
FollowDirectorySymlinks no
FollowFileSymlinks no
CrossFilesystems yes
DatabaseDirectory /var/lib/clamav
SelfCheck 3600
DetectPUA yes
ScanPE yes
ScanELF yes
ScanOLE2 yes
ScanPDF yes
ScanSWF yes
ScanXMLDOCS yes
ScanHWP3 yes
MaxScanSize 500M
MaxFileSize 500M
MaxRecursion 16
MaxFiles 10000
MaxEmbeddedPE 10M
MaxHTMLNormalize 10M
MaxHTMLNoTags 2M
MaxScriptNormalize 5M
MaxZipTypeRcg 1M
MaxPartitions 128
MaxIconsPE 200
PCREMatchLimit 100000
PCRERecMatchLimit 2000
DisableCertCheck no

# ============================================================
# NexChat - Virtual Host (HTTP - dev without SSL)
# ============================================================
# For production with SSL, replace with https.conf

server {
    listen 80;
    server_name localhost _;

    # Connection limits
    limit_conn conn_limit 50;

    # --- Security ---
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self' 'unsafe-inline' 'unsafe-eval'; "
        "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; "
        "font-src 'self' https://fonts.gstatic.com; "
        "img-src 'self' data: blob: http://localhost:9000; "
        "connect-src 'self' ws://localhost wss://localhost http://localhost:9000; "
        "media-src 'self' blob:; "
        "frame-ancestors 'none';"
        always;

    # ---- API REST endpoints ----
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://api_cluster;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Cache control for API
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ---- Auth endpoints (strict rate limit) ----
    location ~ ^/api/v1/auth/(login|register|otp) {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://api_cluster;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- File uploads (rate limited) ----
    location /api/v1/files/upload {
        limit_req zone=upload_limit burst=5 nodelay;
        client_max_body_size 2G;
        client_body_timeout 300s;

        proxy_pass http://api_cluster;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ---- SignalR WebSocket hub ----
    location /hubs/ {
        proxy_pass http://api_cluster;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket specific
        proxy_read_timeout 86400s;    # 24h for persistent connections
        proxy_send_timeout 86400s;
        proxy_buffering off;
        proxy_cache off;

        # Sticky sessions for SignalR negotiation
        # In production, use ip_hash or consistent_hash
        # ip_hash;
    }

    # ---- Health checks (no rate limit) ----
    location /health {
        proxy_pass http://api_cluster;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ---- Prometheus metrics (internal only) ----
    location /metrics {
        allow 172.20.0.0/16;  # Docker network only
        deny all;
        proxy_pass http://api_cluster;
    }

    # ---- Grafana ----
    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---- Kibana ----
    location /kibana/ {
        proxy_pass http://kibana:5601/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ---- Angular frontend (catch-all for SPA routing) ----
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # SPA: fallback for Angular router
        proxy_intercept_errors on;
        error_page 404 = @frontend_fallback;
    }

    location @frontend_fallback {
        proxy_pass http://frontend_upstream;
    }

    # ---- Static assets caching ----
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ---- Deny hidden files ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---- Custom error pages ----
    error_page 429 /errors/429.json;
    error_page 500 502 503 504 /errors/5xx.json;

    location /errors/ {
        internal;
        root /etc/nginx;
    }
}
